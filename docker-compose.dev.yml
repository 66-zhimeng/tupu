services:
  postgres:
    image: postgres:16-alpine
    container_name: tupu-postgres
    environment:
      POSTGRES_USER: tupu
      POSTGRES_PASSWORD: tupu123
      POSTGRES_DB: tupu
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: tupu-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
